# Money amounts use integer minor units: GBP pence. Rates use quoted decimal
# strings so compliance data is never decoded through binary floating point.
meta:
  id: isle-of-man
  version: "1.0"
  name: Isle of Man
  currency: GBP
company_acts:
  companies-act-1931:
    label: Companies Act 1931
    minimum_directors: 2
    corporate_directors: false
    company_number_suffixes: [C]
  companies-act-2006:
    label: Companies Act 2006
    minimum_directors: 1
    company_number_suffixes: [V]
tax:
  year_end:
    month: 4
    day: 5
  corporate_income:
    "2025-26":
      standard_rate: "0.0"
    "2026-27":
      standard_rate: "0.0"
  personal_income:
    "2025-26":
      personal_allowance_minor_units: 1475000
      bands:
        - upto_minor_units: 650000
          rate: "0.10"
        - rate: "0.21"
    "2026-27":
      personal_allowance_minor_units: 1475000
      bands:
        - upto_minor_units: 650000
          rate: "0.10"
        - rate: "0.21"
  dividends:
    "2025-26":
      withholding: none
      personal_tax_set_aside_template: 'set aside personally {{ estimate }}'
    "2026-27":
      withholding: none
      personal_tax_set_aside_template: 'set aside personally {{ estimate }}'
  vat:
    regime: uk-shared
    authority: Isle of Man Customs & Excise
    "2025-26":
      standard_rate: "0.20"
    "2026-27":
      standard_rate: "0.20"
    treatments:
      domestic:
        output_vat: true
        vat_return_net_sales: true
      reverse-charge-eu-b2b:
        output_vat: false
        vat_return_net_sales: true
        reverse_charge_kind: b2b_services_eu
    reverse_charge:
      b2b_services_eu:
        article: Article 196, Directive 2006/112/EC
        invoice_wording: 'VAT reverse charge applies: VAT to be accounted for by the recipient under Article 196, Council Directive 2006/112/EC. Supplier is established in the Isle of Man.'
filings:
  annual_return:
    due: incorporation_anniversary + 1 month
    authority: IoM Companies Registry
  company_tax_return:
    due: accounting_year_end + 12 months + 1 day
    required_at_zero_rate: true
  personal_tax_return:
    due: tax_year_end + 6 months + 1 day
    authority: IoM Income Tax Division
  vat_return:
    due: quarter_end + 1 month
    cadence: quarterly
    authority: Isle of Man Customs & Excise
    requires_vat_registration: true
director_loans:
  s455_charge: false
  credit:
    status_text: In credit — tax-free to withdraw
    explainer_template: You can repay yourself up to {{ balance }} at any time with no tax consequence.
  overdrawn:
    warn: benefit_in_kind_interest_free
    warning_template: 'Your loan account is {{ balance }} overdrawn. The Isle of Man has no UK-style s455 charge, but an interest-free loan can create a taxable benefit in kind - charge interest at the official rate or clear it with a dividend.'
    remedy: clear_with_dividend
advisor_rules:
  - id: overdue_invoice
    severity: amber
    surfaces: [dashboard, invoices]
    fact_query: [client_name, count, days_overdue, invoice_id, invoice_number]
    condition: count > 0
    text_template: 'Invoice {{ invoice_number }} is {{ days_overdue }} days overdue. Send a reminder to {{ client_name }}.'
    cta:
      label: Send reminder
      action: invoicing.sendReminder
      params:
        invoice_id: '{{ invoice_id }}'
  - id: dla_overdrawn_bik
    severity: amber
    surfaces: [dashboard, dla]
    fact_query: [balance, clearance_amount_minor_units, status]
    condition: status = "overdrawn"
    text_template: 'Your loan account is {{ balance }} overdrawn. The Isle of Man has no UK-style s455 charge, but an interest-free loan can create a taxable benefit in kind - charge interest at the official rate or clear it with a dividend.'
    cta:
      label: Clear with dividend
      action: 'navigate:/dividends?amount={{ clearance_amount_minor_units }}'
  - id: filing_deadline_window
    severity: amber
    surfaces: [dashboard, reports]
    fact_query: [authority, due_date, days_until, filing_name, filing_status, warn_window_days]
    condition: due_date - today <= 30
    text_template: '{{ filing_name }} due {{ due_date }} - file with {{ authority }}.'
    cta:
      label: Open filing calendar
      action: reports.openFilingCalendar
  - id: dividend_set_aside
    severity: teal
    surfaces: [dashboard, dividends]
    fact_query: [dividend_headroom, estimate, estimate_minor_units, headroom_minor_units]
    condition: headroom_minor_units > 0
    text_template: 'Set aside {{ estimate }} personally for IoM income tax if you declare the available {{ dividend_headroom }} dividend headroom.'
    cta:
      label: Open dividends
      action: dividends.open
  - id: rates_stale
    severity: amber
    surfaces: [dashboard, banking, invoices]
    fact_query: [stale_days]
    condition: stale_days > 0
    text_template: 'ECB rates are stale. Refresh rates before issuing or settling foreign-currency transactions.'
    cta:
      label: Refresh rates
      action: moneyfx.refreshRates
  - id: company_minimum_directors
    severity: amber
    surfaces: [dashboard, settings]
    fact_query: [act_name, director_count, minimum_directors]
    condition: minimum_directors > 0 and director_count < minimum_directors
    text_template: 'Your company is registered under the {{ act_name }} and must have at least {{ minimum_directors }} directors - profile lists {{ director_count }}.'
    cta:
      label: Open company settings
      action: 'navigate:/settings/company'
