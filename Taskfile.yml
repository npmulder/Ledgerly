version: "3"

tasks:
  build:
    desc: Build the ledgerly binary
    cmds:
      - go build -o ledgerly ./cmd/ledgerly

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  lint:
    desc: Run Go formatting and vet checks
    cmds:
      - test -z "$(gofmt -l cmd internal)"
      - go vet ./...

  run:
    desc: Run the ledgerly skeleton
    cmds:
      - go run ./cmd/ledgerly {{.CLI_ARGS}}
