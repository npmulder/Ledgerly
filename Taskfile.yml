version: "3"

vars:
  GOLANGCI_LINT_VERSION: v2.8.0

includes:
  web:
    taskfile: ./web/Taskfile.yml
    dir: ./web

tasks:
  build:
    desc: Build the ledgerly binary and vet all Go packages
    deps:
      - web:build
    cmds:
      - go build -trimpath -o ledgerly ./cmd/ledgerly
      - go list ./... | grep -v '/web/node_modules/' | xargs go build
      - go list ./... | grep -v '/web/node_modules/' | xargs go vet

  test:
    desc: Run unit tests
    cmds:
      - go list ./... | grep -v '/web/node_modules/' | xargs go test

  test:integration:
    desc: Run integration tests when LEDGERLY_TEST_DB is configured
    cmds:
      - |
        if [ -z "${LEDGERLY_TEST_DB:-}" ]; then
          echo "LEDGERLY_TEST_DB not set; skipping integration tests."
          exit 0
        fi
        go list ./... | grep -v '/web/node_modules/' | xargs go test -tags=integration

  golden:update:
    desc: Regenerate document golden snapshots inside the deterministic Chromium image
    cmds:
      - task: golden:docker
        vars:
          CLI_ARGS: "-run TestPDFMatchesGolden -update"

  golden:docker:
    desc: Run document golden tests inside the deterministic Chromium image
    cmds:
      - mkdir -p .task/golden-artifacts
      - docker build --target golden-test -t ledgerly-golden-test:local .
      - |
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -e CHROME_BIN=/headless-shell/headless-shell \
          -e GOLDEN_REQUIRE_CHROME=1 \
          -e GOLDEN_ARTIFACT_DIR=/src/.task/golden-artifacts \
          -e HOME=/tmp \
          -e XDG_CACHE_HOME=/tmp/.cache \
          -e XDG_CONFIG_HOME=/tmp/.config \
          -e GOCACHE=/tmp/go-build \
          -e GOMODCACHE=/tmp/go/pkg/mod \
          -v "{{.ROOT_DIR}}:/src" \
          -w /src \
          ledgerly-golden-test:local \
          go test ./internal/it/golden {{.CLI_ARGS}}

  lint:
    desc: Run all lint checks
    deps:
      - lint:fmt
      - lint:golangci
      - lint:arch
      - lint:rates

  lint:fmt:
    desc: Check Go formatting
    cmds:
      - test -z "$(gofmt -l cmd internal tools)"

  lint:golangci:
    desc: Run golangci-lint
    cmds:
      - find cmd internal tools web -name '*.go' -not -path '*/node_modules/*' -not -path '*/testdata/*' -exec dirname {} \; | sort -u | sed 's#^#./#' | xargs go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}} run --config .golangci.yml

  lint:arch:
    desc: Enforce internal module import boundaries
    cmds:
      - go run ./tools/archcheck arch

  lint:rates:
    desc: Prevent compliance literals outside jurisdiction packs
    cmds:
      - go run ./tools/archcheck rates

  ci:
    desc: Run the same checks as CI
    deps:
      - build
      - test
      - test:integration
      - lint
      - web:lint
      - web:test
      - web:build
      - api:drift-check

  run:
    desc: Run the ledgerly skeleton
    cmds:
      - go run ./cmd/ledgerly {{.CLI_ARGS}}

  api:generate:
    desc: Generate the committed TypeScript API client from the Go OpenAPI spec
    cmds:
      - mkdir -p .task
      - go run ./cmd/ledgerly openapi > .task/openapi.json
      - LEDGERLY_OPENAPI_URL=../.task/openapi.json task web:api:generate

  api:drift-check:
    desc: Regenerate the API client and fail when committed output is stale
    cmds:
      - task: api:generate
      - |
        if [ -n "$(git status --porcelain -- web/src/api/generated)" ]; then
          git status --short -- web/src/api/generated
          exit 1
        fi
