# Local development services. Toolchain lives in mise.toml; services live here.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledgerly_dev
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledgerly_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
