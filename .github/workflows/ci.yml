name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

jobs:
  integration:
    name: integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledgerly_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ledgerly_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      LEDGERLY_TEST_DB: postgres://postgres:postgres@localhost:5432/ledgerly_dev?sslmode=disable
      GOLDEN_ARTIFACT_DIR: .task/integration-artifacts/golden
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Build frontend assets
        run: task web:build

      - name: Prepare integration artifacts
        run: mkdir -p .task/integration-artifacts/golden

      - name: Build deterministic integration image
        run: docker build --target golden-test -t ledgerly-golden-test:ci .

      - name: Integration tests
        shell: bash
        run: |
          set -o pipefail
          docker run --rm \
            --network host \
            --user "$(id -u):$(id -g)" \
            -e CHROME_BIN=/headless-shell/headless-shell \
            -e GOLDEN_REQUIRE_CHROME=1 \
            -e GOLDEN_ARTIFACT_DIR=/src/.task/integration-artifacts/golden \
            -e LEDGERLY_TEST_DB="${LEDGERLY_TEST_DB}" \
            -e HOME=/tmp \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -e XDG_CONFIG_HOME=/tmp/.config \
            -e GOCACHE=/tmp/go-build \
            -e GOMODCACHE=/tmp/go/pkg/mod \
            -v "${PWD}:/src" \
            -w /src \
            ledgerly-golden-test:ci \
            go test -tags=integration ./internal/it/... -count=1 -v 2>&1 | tee .task/integration-artifacts/harness.log

      - name: Upload integration failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-artifacts
          path: .task/integration-artifacts
          if-no-files-found: warn

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Build and vet
        run: task build

  web-lint:
    name: web lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Frontend lint
        run: task web:lint

  web-test:
    name: web test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Frontend tests
        run: task web:test

  web-build:
    name: web build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Frontend build
        run: task web:build

  api-drift-check:
    name: api drift check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: API drift check
        run: task api:drift-check

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Unit tests
        run: task test

      - name: Money package coverage
        run: |
          go test ./internal/moneyfx/money -covermode=count -coverprofile=/tmp/moneyfx-money.cover
          total="$(go tool cover -func=/tmp/moneyfx-money.cover | awk '/^total:/ {print $3}')"
          test "$total" = "100.0%"

  golden-snapshots:
    name: golden snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Golden PDF snapshots
        run: task golden:docker

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Lint
        run: task lint

  docker-image:
    name: docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --build-arg GIT_SHA="${GITHUB_SHA}" -t ledgerly:"${GITHUB_SHA}" .
